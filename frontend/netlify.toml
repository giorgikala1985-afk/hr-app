[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  CI = "false"

# Proxy all API calls to the backend on Vercel.
# This keeps the frontend's relative "/api" requests working (no CORS needed).
# >>> Replace YOUR-BACKEND with your actual Vercel deployment domain. <<<
[[redirects]]
  from = "/api/*"
  to = "https://hr-app-backend-x59e.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback so client-side routes (e.g. /documents) resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
