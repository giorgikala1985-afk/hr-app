services:
  - type: web
    name: hr-manager
    runtime: node
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TBC_API_BASE_URL
        value: https://api.tbcbank.ge/v1
      - key: TBC_API_KEY
        sync: false
      - key: TBC_CLIENT_ID
        sync: false
      - key: TBC_CLIENT_SECRET
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: RS_SERVICE_USER
        sync: false
      - key: RS_SERVICE_PASSWORD
        sync: false
      - key: RS_COMPANY_TIN
        sync: false
